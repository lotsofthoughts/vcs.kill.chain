name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-amd64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64
            ext: ".exe"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2.0.2
        with:
          deno-version: v2.x

      - name: Update Version
        run: deno run --allow-all src/make_version.ts

      - name: Compile Binary
        run: |
          deno compile --allow-all --no-check \
            --target=${{ matrix.target }} \
            --output vcs-agent-${{ matrix.suffix }}${{ matrix.ext }} \
            ./src/mod.ts

      - name: Generate Checksum
        shell: bash
        run: |
          if command -v shasum &> /dev/null; then
            shasum -a 256 vcs-agent-${{ matrix.suffix }}${{ matrix.ext }} > vcs-agent-${{ matrix.suffix }}${{ matrix.ext }}.sha256
          else
            sha256sum vcs-agent-${{ matrix.suffix }}${{ matrix.ext }} > vcs-agent-${{ matrix.suffix }}${{ matrix.ext }}.sha256
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcs-agent-${{ matrix.suffix }}
          path: |
            vcs-agent-${{ matrix.suffix }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Set Executable Permissions
        run: chmod +x vcs-agent-*/vcs-agent-* 2>/dev/null || true

      - name: Read Release Notes
        id: notes
        run: |
          if [ -f release-notes.md ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat release-notes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: |
            vcs-agent-*/vcs-agent-*
