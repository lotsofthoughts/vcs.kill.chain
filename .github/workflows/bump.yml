name: Version Bump & Tag

on:
  push:
    branches:
      - main

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version_bump.outputs.version }}
      release_tag: ${{ steps.version_bump.outputs.version_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version Bump
        id: version_bump
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "#major"
          minor_pattern: "#minor"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: true
          change_path: "src"
          bump_each_commit_patch_pattern: ""

      - name: Print Version Info
        run: |
          echo "New Version: ${{ steps.version_bump.outputs.version }}"
          echo "Release Tag: ${{ steps.version_bump.outputs.version_tag }}"

      - name: Push Tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          TAG="${{ steps.version_bump.outputs.version_tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Pushed tag: $TAG"
          else
            echo "Tag $TAG already exists, skipping"
          fi
