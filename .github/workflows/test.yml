name: Test & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2.0.2
        with:
          deno-version: v2.x

      - name: Type Check
        run: deno check src/mod.ts

      - name: Lint
        run: deno lint

      - name: Format Check
        run: deno fmt --check
        continue-on-error: true

      - name: Unit Tests
        run: deno test -A --parallel src/tests/unit/

      - name: Integration Tests
        run: deno test -A src/tests/integration/internal/
