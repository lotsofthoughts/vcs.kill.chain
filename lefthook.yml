# Lefthook configuration
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: "Lint"
      tags:
        - quality
      run: deno lint
    - name: "Type Check"
      tags:
        - quality
      run: deno check src/mod.ts
    - name: "Unit Tests"
      tags:
        - quality
      run: deno test -A --parallel src/tests/unit/

pre-push:
  parallel: false
  jobs:
    - name: "Lint"
      tags:
        - quality
      run: deno lint
    - name: "Full Tests"
      tags:
        - quality
      run: deno test -A --parallel src/tests/
